<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheesoid</title>
  <link rel="stylesheet" href="https://handfish.noisefactor.io/0.9.0/styles/index.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <div id="name-prompt" class="hidden">
      <label for="name-input" class="hf-text-lg hf-text-bright hf-font-semibold">What's your name?</label>
      <div id="name-form" class="hf-flex hf-gap-2">
        <input type="text" id="name-input" class="hf-text" placeholder="Enter your name" autocomplete="off">
        <button id="name-btn" class="hf-btn hf-btn-primary">Join</button>
      </div>
    </div>
    <div id="chat" class="hidden">
      <aside id="sidebar">
        <div id="sidebar-header" class="hf-border-bottom hf-p-4">
          <h1 id="persona-name" class="hf-text-md hf-font-semibold hf-text-bright">Cheesoid</h1>
          <span id="presence-status" class="hf-text-xs hf-text-dim"></span>
        </div>
        <div id="sidebar-section-label" class="hf-label">People</div>
        <ul id="participants" class="hf-scrollbar"></ul>
        <button id="sidebar-toggle" class="hf-btn hf-btn-ghost" title="Collapse sidebar"><span class="hf-icon">chevron_left</span></button>
      </aside>
      <div id="chat-main">
        <header class="hf-flex hf-items-center hf-justify-between hf-border-bottom">
          <div id="header-left" class="hf-flex hf-items-center hf-gap-2">
            <button id="sidebar-open" class="hf-btn hf-btn-ghost hidden" title="Open sidebar"><span class="hf-icon">menu</span></button>
            <span id="channel-name" class="hf-text-base hf-font-semibold hf-text-bright"># cheesoid</span>
          </div>
          <div id="header-right" class="hf-flex hf-items-center hf-gap-3">
            <button id="reset-btn" class="hf-btn" title="Reset conversation">Reset</button>
          </div>
        </header>
        <main>
          <div id="messages" class="hf-scrollbar"></div>
          <div id="input-area" class="hf-flex hf-gap-2 hf-border-top">
            <textarea id="input" class="hf-textarea" placeholder="Say something..." rows="1"></textarea>
            <button id="send-btn" class="hf-btn hf-btn-primary">Send</button>
          </div>
        </main>
      </div>
    </div>
  </div>
  <script type="module" src="/js/chat.js"></script>
</body>
</html>
